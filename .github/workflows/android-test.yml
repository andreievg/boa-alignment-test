name: Android Alignment Test

on: [push, pull_request]

jobs:
  test-arm64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
      
    - name: Build ARM64
      run: cross build --target aarch64-linux-android --release --bin test_runner
      
    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        
    - name: Setup Android Emulator (ARM64)
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 31 
        arch: arm64-v8a
        target: google_apis
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -qemu -enable-kvm
        disable-animations: true
        script: |
          adb push target/aarch64-linux-android/release/test_runner /data/local/tmp/
          adb shell "chmod +x /data/local/tmp/test_runner"
          adb shell "cd /data/local/tmp && ./test_runner"