name: Android Alignment Test

on: [push, pull_request]

jobs:
  test-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: aarch64-linux-android
        
    - name: Build Android .so
      run: |
        export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
        cargo build --target aarch64-linux-android --release
        
    - name: Build test runner
      run: |
        cd android-test
        $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang \
          -o test_runner main.c -ldl
          
    - name: Setup Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        arch: arm64-v8a
        script: |
          adb push target/aarch64-linux-android/release/libboa_alignment_test.so /data/local/tmp/
          adb push android-test/test_runner /data/local/tmp/
          adb shell "cd /data/local/tmp && chmod +x test_runner && ./test_runner"