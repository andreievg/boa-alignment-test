name: Android Emulator CI

on:
  push:
    branches:
      - main

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build ARM64 binary
        run: cross build --target aarch64-linux-android --release --bin test_runner

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-binaries
          path: target/aarch64-linux-android/release/test_runner
          retention-days: 7

  run-emulator:
    runs-on: ubuntu-latest
    needs: build-arm64  # Ensure this job runs after the build-arm64 job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2.0.7
        with:
          api-level: '30'
          target: 'android-30'
          arch: 'arm64-v8a'

      - name: Start Android Emulator
        run: |
          echo "Starting Android Emulator"
          emulator -avd your_avd_name -no-window -gpu swiftshader_indirect &

      - name: Wait for Emulator to Boot
        run: |
          adb wait-for-device
          adb shell input keyevent 82  # Unlock the device

      - name: Download ARM64 Binary
        uses: actions/download-artifact@v2
        with:
          name: android-arm64-binaries

      - name: Push Binary to Emulator
        run: |
          adb push target/aarch64-linux-android/release/test_runner /data/local/tmp/

      - name: Run Binary on Emulator
        run: |
          adb shell chmod 755 /data/local/tmp/test_runner
          adb shell /data/local/tmp/test_runner