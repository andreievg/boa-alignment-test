name: Android ARM64 Test

on: [push, pull_request]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
      
    - name: Build ARM64 binary
      run: cross build --target aarch64-linux-android --release --bin test_runner
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-binaries
        path: target/aarch64-linux-android/release/test_runner
        retention-days: 7

  test-emulator:
    runs-on: ubuntu-latest  # Use regular ubuntu-latest
    needs: build-arm64
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-arm64-binaries
        path: ./binaries/
        
    - name: Make executable
      run: chmod +x binaries/test_runner
        
    - name: Setup Android Emulator (Software Emulation)
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        arch: arm64-v8a
        target: google_apis
        # Disable hardware acceleration and use software emulation
        emulator-options: >-
          -no-snapshot-save
          -no-window
          -gpu swiftshader_indirect
          -noaudio
          -no-boot-anim
          -camera-back none
          -accel off
          -qemu -machine virt
        disable-animations: true
        # Increase timeout since software emulation is slower
        emulator-build: 7425822
        script: |
          echo "=== Waiting for emulator to fully boot ==="
          adb wait-for-device
          adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'
          
          echo "=== Pushing test binary ==="
          adb push binaries/test_runner /data/local/tmp/
          adb shell "chmod +x /data/local/tmp/test_runner"
          
          echo "=== Running test ==="
          adb shell "cd /data/local/tmp && ./test_runner"