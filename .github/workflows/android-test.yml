name: Android ARM64 Test (macOS 15)

on: [push, pull_request]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
      
    - name: Build ARM64 binary
      run: cross build --target aarch64-linux-android --release --bin test_runner
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-binaries
        path: target/aarch64-linux-android/release/test_runner
        retention-days: 7

  test-emulator:
    runs-on: macos-15  # Use macOS 15 ARM64 runner
    needs: build-arm64
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-arm64-binaries
        path: ./binaries/
        
    - name: Make executable
      run: chmod +x binaries/test_runner

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      run: |
        # Install Android SDK
        brew install android-commandlinetools
        
        # Set environment variables
        export ANDROID_HOME=$HOME/Library/Android/sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator
        
        # Create SDK directory structure
        mkdir -p $ANDROID_HOME/cmdline-tools
        
        # Move cmdline-tools to proper location if needed
        if [ -d "/opt/homebrew/share/android-commandlinetools" ]; then
          cp -r /opt/homebrew/share/android-commandlinetools/* $ANDROID_HOME/cmdline-tools/
        fi
        
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH

    - name: Accept Android SDK licenses and install components
      run: |
        # Accept licenses
        yes | sdkmanager --licenses || true
        
        # Install required components
        sdkmanager "platform-tools"
        sdkmanager "emulator"
        sdkmanager "system-images;android-30;default;arm64-v8a"
        
        # List installed packages
        sdkmanager --list_installed

    - name: Create AVD
      run: |
        echo "no" | avdmanager create avd \
          -n test_avd \
          -k "system-images;android-30;default;arm64-v8a" \
          --force \
          --device "pixel_xl"

    - name: Debug environment before starting emulator
      run: |
        echo "=== Environment check ==="
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "PATH: $PATH"
        
        echo "=== Available emulators ==="
        emulator -list-avds
        
        echo "=== AVD details ==="
        cat ~/.android/avd/test_avd.avd/config.ini || echo "No config found"
        
        echo "=== ADB version ==="
        adb version
        
        echo "=== Current ADB devices ==="
        adb devices

    - name: Start ADB server
      run: |
        echo "Starting ADB server..."
        adb kill-server
        adb start-server
        sleep 2

    - name: Start emulator in background
      run: |
        echo "Starting emulator..."
        nohup emulator -avd test_avd \
          -no-window -no-audio -no-boot-anim \
          -gpu swiftshader_indirect \
          -memory 2048 -cores 2 \
          -camera-back none -camera-front none \
          -wipe-data \
          -verbose > emulator.log 2>&1 &
        
        echo "Emulator started in background with PID: $!"
        
        # Give emulator a moment to initialize
        sleep 10

    - name: Wait for emulator to start
      run: |
        echo "Waiting for emulator to start..."
        
        # Check emulator logs first
        echo "=== Initial emulator logs ==="
        head -20 emulator.log || echo "No logs yet"
        
        # Wait for device to be detected (max 8 minutes)
        COUNTER=0
        until adb devices | grep -q "emulator" || [ $COUNTER -eq 96 ]; do 
          if [ $((COUNTER % 6)) -eq 0 ]; then
            echo "Waiting for emulator device... ($COUNTER/96) - $(date)"
            echo "Current ADB devices:"
            adb devices
            echo "Emulator processes:"
            ps aux | grep emulator || echo "No emulator processes found"
          fi
          sleep 5;
          COUNTER=$((COUNTER + 1))
        done
        
        if [ $COUNTER -eq 96 ]; then
          echo "Timeout waiting for emulator device"
          echo "=== Final emulator logs ==="
          tail -50 emulator.log || echo "No logs found"
          exit 1
        fi
        
        echo "Emulator device detected!"
        
        # Wait for device to be ready
        adb wait-for-device
        echo "ADB connected to device"
        
        # Wait for boot to complete (max 5 minutes)
        COUNTER=0
        until adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1" || [ $COUNTER -eq 30 ]; do 
          echo "Waiting for boot to complete... ($COUNTER/30)"; 
          sleep 10;
          COUNTER=$((COUNTER + 1))
        done
        
        if [ $COUNTER -eq 30 ]; then
          echo "Timeout waiting for boot to complete"
          exit 1
        fi
        
        echo "Emulator is ready!"

    - name: Test emulator and run binary
      run: |
        echo "=== Device info ==="
        adb shell getprop ro.product.cpu.abi
        adb shell getprop ro.build.version.release
        adb shell getprop ro.hardware
        adb shell uname -m
        
        echo "=== System info ==="
        adb shell cat /proc/cpuinfo | head -10
        
        echo "=== Pushing test binary ==="
        adb push binaries/test_runner /data/local/tmp/
        adb shell chmod 755 /data/local/tmp/test_runner
        
        echo "=== Testing binary ==="
        adb shell ls -la /data/local/tmp/test_runner
        adb shell file /data/local/tmp/test_runner
        
        echo "=== Running test ==="
        adb shell /data/local/tmp/test_runner

    - name: Show emulator logs on failure
      if: failure()
      run: |
        echo "=== Emulator logs ==="
        cat emulator.log || echo "No emulator logs found"
        
        echo "=== ADB devices ==="
        adb devices -l
        
        echo "=== AVD list ==="
        avdmanager list avd