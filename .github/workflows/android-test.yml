name: Android Alignment Test

on: 
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        components: rustfmt, clippy
          
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
      
    - name: Check formatting
      run: cargo fmt -- --check
      
    - name: Run clippy
      run: cargo clippy -- -D warnings
      
    - name: Build for Android ARM64 (library)
      run: cross build --target aarch64-linux-android --release --lib
      
    - name: Build for Android ARM64 (binary)
      run: cross build --target aarch64-linux-android --release --bin test_runner
      
    - name: List built files
      run: |
        echo "=== Built files ==="
        ls -la target/aarch64-linux-android/release/
        echo ""
        echo "=== File info ==="
        file target/aarch64-linux-android/release/libboa_alignment_test.so
        file target/aarch64-linux-android/release/test_runner
        echo ""
        echo "=== Binary size ==="
        du -h target/aarch64-linux-android/release/test_runner
        du -h target/aarch64-linux-android/release/libboa_alignment_test.so
  
    - name: Enable KVM
      run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

    - name: Setup Android Emulator and run test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        arch: arm64-v8a
        target: default
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          echo "=== Setting up test environment ==="
          
          # Push the test binary to emulator
          adb push target/aarch64-linux-android/release/test_runner /data/local/tmp/
          
          # Make it executable
          adb shell "chmod +x /data/local/tmp/test_runner"
          
          echo "=== Running tests ==="
          
          # Run the test with environment variables for better debugging
          adb shell "cd /data/local/tmp && RUST_BACKTRACE=full RUST_LOG=debug ./test_runner"
          
          echo "=== Test completed ==="
