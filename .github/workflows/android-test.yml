name: Android ARM64 Test (No Emulator)

on: [push, pull_request]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
      
    - name: Build ARM64 binary
      run: cross build --target aarch64-linux-android --release --bin test_runner
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-binaries
        path: target/aarch64-linux-android/release/test_runner

  test-arm64-direct:
    runs-on: ubuntu-latest
    needs: build-arm64
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-arm64-binaries
        path: ./binaries/
        
    - name: Set up QEMU for ARM64 emulation
      uses: docker/setup-qemu-action@v2
      with:
        platforms: arm64
        
    - name: Test ARM64 binary directly
      run: |
        chmod +x binaries/test_runner
        
        # Run directly with QEMU user mode emulation
        docker run --rm --platform linux/arm64 \
          -v $(pwd)/binaries:/app \
          ubuntu:22.04 \
          /app/test_runner