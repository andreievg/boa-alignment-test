name: Android Alignment Test

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
      
    - name: Build Android ARM64 shared library
      run: cross build --target aarch64-linux-android --release --lib
      
    - name: Build Android ARM64 test binary
      run: cross build --target aarch64-linux-android --release --bin test_runner
      
    - name: List built files
      run: |
        echo "Built files:"
        ls -la target/aarch64-linux-android/release/
        file target/aarch64-linux-android/release/libboa_alignment_test.so
        file target/aarch64-linux-android/release/test_runner
        
    - name: Setup Android Emulator and run test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        arch: arm64-v8a
        target: default
        script: |
          # Push the test binary to emulator
          adb push target/aarch64-linux-android/release/test_runner /data/local/tmp/
          adb push target/aarch64-linux-android/release/libboa_alignment_test.so /data/local/tmp/
          
          # Run the test
          adb shell "cd /data/local/tmp && chmod +x test_runner && LD_LIBRARY_PATH=. ./test_runner"