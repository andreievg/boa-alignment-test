name: Android ARM64 Test

on: [push, pull_request]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        
    - name: Install cross
      run: cargo install cross --git https://github.com/cross-rs/cross
      
    - name: Build ARM64 binary
      run: cross build --target aarch64-linux-android --release --bin test_runner
      
    - name: Build ARM64 library
      run: cross build --target aarch64-linux-android --release --lib
      
    - name: Verify build artifacts
      run: |
        echo "=== Built files ==="
        ls -la target/aarch64-linux-android/release/
        file target/aarch64-linux-android/release/test_runner
        file target/aarch64-linux-android/release/libboa_alignment_test.so
        echo "=== Binary size ==="
        du -h target/aarch64-linux-android/release/test_runner
        du -h target/aarch64-linux-android/release/libboa_alignment_test.so
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-binaries
        path: |
          target/aarch64-linux-android/release/test_runner
          target/aarch64-linux-android/release/libboa_alignment_test.so
        retention-days: 7

  test-emulator:
    runs-on: macos-latest
    needs: build-arm64
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: android-arm64-binaries
        path: ./binaries/
        
    - name: Verify downloaded artifacts
      run: |
        echo "=== Downloaded artifacts ==="
        ls -la binaries/
        file binaries/test_runner
        file binaries/libboa_alignment_test.so
        chmod +x binaries/test_runner
        
    - name: Setup Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        arch: arm64-v8a
        target: google_apis
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          echo "=== Setting up test environment ==="
          
          # Push binaries to emulator
          adb push binaries/test_runner /data/local/tmp/
          adb push binaries/libboa_alignment_test.so /data/local/tmp/
          
          # Set permissions
          adb shell "chmod +x /data/local/tmp/test_runner"
          
          echo "=== Running alignment tests ==="
          
          # Run the test with full debugging
          adb shell "cd /data/local/tmp && RUST_BACKTRACE=full RUST_LOG=debug LD_LIBRARY_PATH=. ./test_runner"
          
          echo "=== Test completed ==="
